  - {type: variant, offset: 3437, length: 2, content: 奉行, 明: 奉行火唵吉祥陀羅尼，那謨阿羅那哆羅，夜耶那謨彌陀婆耶怛他揭哆耶，那謨曷耶，跋嚧枳帝攝拔囉耶，菩提薩哆嚩耶，摩訶薩埵耶，摩訶伽嚧尼，伽耶，怛姪他，唵阿慕佉阿波唎帝，喝多吽，吽破吒娑婆訶, 宋: 奉行火唵吉祥陀羅尼第六，那謨阿羅那哆羅，夜耶那謨彌陀婆耶怛他揭哆耶，那謨曷耶，跋嚧根帝攝拔囉耶，菩提薩哆嚩耶，摩訶薩埵耶，摩訶伽嚧尼，伽耶，怛姪他，唵阿慕佉阿波唎帝，喝多吽，吽破吒娑婆訶, 元: 奉行火唵吉祥陀羅尼第六，那謨阿羅那哆羅，夜耶那謨彌陀婆耶怛他揭哆耶，那謨曷耶，跋嚧根帝攝拔囉耶，菩提薩哆嚩耶，摩訶薩埵耶，摩訶伽嚧尼，伽耶，怛姪他，唵阿慕佉阿波唎帝，喝多吽，吽破吒娑婆訶}
